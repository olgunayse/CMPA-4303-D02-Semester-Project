<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Homes Smarter</title>

    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">Compare Homes Smarter</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="compare.html">Compare</a>
    </div>
</nav>

<main>

<section class="compare-hero">
    <h1>Compare Homes</h1>
    <p>Choose what matters most to see which home is the better fit.</p>
</section>

<section class="compare-section">

    <!-- MODERN TABS -->
    <div class="priority-buttons">
        <button class="active" onclick="selectPriority(this, 'budget')">Lower Price</button>
        <button onclick="selectPriority(this, 'space')">More Space</button>
        <button onclick="selectPriority(this, 'location')">Better Location</button>
        <button onclick="selectPriority(this, 'balance')">Balanced</button>
    </div>

    <p id="comparisonResult" class="comparison-result">
        Home A is better for buyers focused on a lower price.
    </p>

    <!-- CARDS -->
    <div class="compare-grid">

        <div class="compare-card active-card" id="homeA">
            <h2>Home A</h2>
            <p>$300,000</p>
            <p>2,000 sqft</p>
            <p>Suburb</p>
        </div>

        <div class="compare-card" id="homeB">
            <h2>Home B</h2>
            <p>$350,000</p>
            <p>1,500 sqft</p>
            <p>City</p>
        </div>

    </div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
