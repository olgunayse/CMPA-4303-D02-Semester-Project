<!DOCTYPE html>
<html>
<head>
    <title>Compare Properties</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 style="padding: 20px;">Compare Properties</h1>

    <!-- Simple Form -->
    <div style="padding: 20px;">
        <input id="propA" type="text" placeholder="Property A" style="padding:10px;">
        <input id="propB" type="text" placeholder="Property B" style="padding:10px;">
        <button onclick="compare()" style="padding:10px;">Compare</button>
    </div>

    <!-- Results -->
    <div class="container">
        <div class="card" id="cardA">
            <h3>Property A</h3>
            <p>Price: --</p>
            <p>Size: --</p>
        </div>

        <div class="card" id="cardB">
            <h3>Property B</h3>
            <p>Price: --</p>
            <p>Size: --</p>
        </div>
    </div>

    <!-- Simple Script -->
    <script>
        function compare() {
            let a = document.getElementById("propA").value;
            let b = document.getElementById("propB").value;

            document.getElementById("cardA").innerHTML =
                "<h3>" + a + "</h3><p>Price: Example</p><p>Size: Example</p>";

            document.getElementById("cardB").innerHTML =
                "<h3>" + b + "</h3><p>Price: Example</p><p>Size: Example</p>";
        }
    </script>

</body>
</html>
