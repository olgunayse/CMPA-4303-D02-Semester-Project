<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Homes Smarter | Agent Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Compare<span>Homes</span>Smarter</div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#compare">Compare Tool</a></li>
                <li><a href="#">Trade-off Guide</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Demystifying the Home Search</h1>
        <p>Helping your clients understand <strong>exactly</strong> what they are paying for.</p>
    </section>

    <main id="compare">
        <section class="comparison-container">
            <div class="selection-area">
                <h2>Property Logic Comparison</h2>
                <p>Select a scenario to show your client the trade-offs:</p>
                <div class="controls">
                    <button onclick="compareProperties('city')">City vs. Suburbs</button>
                    <button onclick="compareProperties('renovated')">Fixer vs. Turn-Key</button>
                </div>
            </div>

            <!-- This area updates dynamically via JavaScript -->
            <div id="comparison-display" class="hidden">
                <!-- Data will be injected here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
