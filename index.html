<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarter Comparison | Compare Homes Smarter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
    <header>
        <nav>
            <div class="logo">Compare<span>Homes</span>Smarter</div>
            <a href="index.html" class="back-link">Return Home</a>
        </nav>
    </header>

    <main class="dashboard">
        <div class="sidebar">
            <h3>Comparison Scenarios</h3>
            <button onclick="updateDashboard('lifestyle')">Urban vs. Suburban</button>
            <button onclick="updateDashboard('investment')">Fixer vs. Turn-Key</button>
            <button onclick="updateDashboard('age')">New Build vs. Historic</button>
        </div>

        <div class="main-view">
            <div class="comparison-cards" id="property-grid">
                <!-- JavaScript will populate two .property-card elements here -->
            </div>

            <div class="logic-insight" id="logic-box">
                <div class="insight-placeholder">Select a scenario to analyze the trade-offs</div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
