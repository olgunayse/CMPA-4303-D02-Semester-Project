<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Homes Smarter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Compare Homes Smarter</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="compare.html">Compare</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Agent Home Comparison Tool</h2>
      <p>
        Enter two homes below to compare their monthly costs, tradeoffs, and what each home may offer to a buyer.
      </p>
    </section>

    <section class="compare-grid">
      <div>
        <h3>Home A</h3>

        <label>Address</label>
        <input type="text" id="addressA" placeholder="Example: Dallas, TX">

        <label>Price</label>
        <input type="number" id="priceA" placeholder="350000">

        <label>Square Feet</label>
        <input type="number" id="sqftA" placeholder="1800">

        <label>Bedrooms</label>
        <input type="number" id="bedsA" placeholder="3">

        <label>Location Score 1-10</label>
        <input type="number" id="locationA" placeholder="8">

        <label>Monthly HOA</label>
        <input type="number" id="hoaA" placeholder="100">
      </div>

      <div>
        <h3>Home B</h3>

        <label>Address</label>
        <input type="text" id="addressB" placeholder="Example: Plano, TX">

        <label>Price</label>
        <input type="number" id="priceB" placeholder="410000">

        <label>Square Feet</label>
        <input type="number" id="sqftB" placeholder="2200">

        <label>Bedrooms</label>
        <input type="number" id="bedsB" placeholder="4">

        <label>Location Score 1-10</label>
        <input type="number" id="locationB" placeholder="9">

        <label>Monthly HOA</label>
        <input type="number" id="hoaB" placeholder="150">
      </div>
    </section>

    <section>
      <h3>Loan Assumptions</h3>

      <label>Down Payment Percent</label>
      <input type="number" id="downPayment" placeholder="10">

      <label>Interest Rate Percent</label>
      <input type="number" id="interestRate" placeholder="7">

      <label>Estimated Property Tax Percent</label>
      <input type="number" id="taxRate" placeholder="2">

      <label>Monthly Insurance Estimate</label>
      <input type="number" id="insurance" placeholder="150">

      <button onclick="compareHomes()">Compare Homes</button>
      <button onclick="resetForm()">Reset</button>
    </section>

    <section id="results" class="results">
      <h2>Comparison Results</h2>
      <p id="monthlyA"></p>
      <p id="monthlyB"></p>
      <p id="tradeoff"></p>
      <p id="buyerType"></p>
      <p id="agentSummary"></p>
    </section>
  </main>

  <footer>
    <p>Compare Homes Smarter</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
