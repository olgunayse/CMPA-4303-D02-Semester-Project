<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Tool | Compare Homes Smarter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">
    <header>
        <nav>
            <div class="logo">Compare<span>Homes</span>Smarter</div>
            <a href="index.html" class="back-link">Return Home</a>
        </nav>
    </header>

    <main class="dashboard">
        <aside class="sidebar">
            <h3>Comparison Logic</h3>
            <p class="sidebar-hint">Select a scenario to explain to your client.</p>
            <div class="scenario-list">
                <button class="scenario-btn active" onclick="updateDashboard('lifestyle', this)">Urban vs. Suburban</button>
                <button class="scenario-btn" onclick="updateDashboard('investment', this)">Fixer vs. Turn-Key</button>
                <button class="scenario-btn" onclick="updateDashboard('age', this)">New Build vs. Historic</button>
            </div>
        </aside>

        <section class="main-view">
            <div class="comparison-cards" id="property-grid"></div>
            <div class="logic-insight" id="logic-box">
                <div class="insight-placeholder">Select a scenario to analyze the trade-offs</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
