<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Homes Smarter</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Compare Homes Smarter</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="compare.html">Compare</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-text">
                <span class="eyebrow">Property Decision Platform</span>
                <h1>Make home comparisons feel clear, not overwhelming.</h1>
                <p>
                    Compare pricing, location, space, and trade offs in a way that helps buyers understand what they are actually choosing between.
                </p>

                <div class="hero-actions">
                    <a href="compare.html" class="primary-button">Start Comparing</a>
                    <a href="#features" class="secondary-button">See Features</a>
                </div>

                <div class="hero-search">
                    <input type="text" id="searchInput" placeholder="Search by city, price, or feature...">
                    <button id="searchButton" type="button">Search</button>
                </div>

                <p id="searchResult"></p>
            </div>

            <div class="hero-visual">
                <div class="hero-image-card">
                    <img src="https://ssl.cdn-redfin.com/photo/90/bigphoto/959/20131959_1.jpg">
                </div>
            </div>
        </section>
    </main>

    <!-- THIS IS THE IMPORTANT PART -->
    <script src="script.js"></script>

</body>
</html>
