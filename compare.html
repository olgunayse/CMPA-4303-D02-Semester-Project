<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Properties</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <p class="small-text">Comparison Tool</p>
            <h1>Compare two properties</h1>
            <p class="hero-description">
                Enter two properties below to view a side-by-side comparison.
            </p>
        </div>
    </section>

    <!-- Form Section -->
    <section class="features">

        <div class="section-title">
            <h2>Start a comparison</h2>
            <p>This is a basic version using example data.</p>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px;">
            <input id="propA" type="text" placeholder="Property A" style="padding:12px; min-width:200px;">
            <input id="propB" type="text" placeholder="Property B" style="padding:12px; min-width:200px;">
            <button onclick="compareProperties()" style="padding:12px 18px;">Compare</button>
        </div>

        <!-- Results -->
        <div class="card-grid">

            <div class="card" id="cardA">
                <h3>Property A</h3>
                <p>Price: --</p>
                <p>Size: --</p>
                <p>Location: --</p>
            </div>

            <div class="card" id="cardB">
                <h3>Property B</h3>
                <p>Price: --</p>
                <p>Size: --</p>
                <p>Location: --</p>
            </div>

        </div>

    </section>

    <!-- Script -->
    <script>
        function compareProperties() {
            let a = document.getElementById("propA").value;
            let b = document.getElementById("propB").value;

            if (a === "") a = "Property A";
            if (b === "") b = "Property B";

            document.getElementById("cardA").innerHTML =
                "<h3>" + a + "</h3><p>Price: $350,000</p><p>Size: 1,800 sqft</p><p>Location: Suburbs</p>";

            document.getElementById("cardB").innerHTML =
                "<h3>" + b + "</h3><p>Price: $420,000</p><p>Size: 1,500 sqft</p><p>Location: Downtown</p>";
        }
    </script>

</body>
</html>
