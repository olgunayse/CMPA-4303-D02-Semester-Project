<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Analysis Tool</title>
</head>
<body>
    <header><div class="wrapper"><h1 class="site-title">HOMES // ANALYZE</h1></div></header>
    <main class="wrapper">
        <section class="card">
            <h3>Set Your Variable</h3>
            <select id="prioritySelect">
                <option value="price">Price Focus</option>
                <option value="space">Space Focus</option>
                <option value="location">Location Focus</option>
                <option value="balance">Neutral Balance</option>
            </select>
            <button class="button" onclick="runComparison()">Execute</button>
        </section>
        <section class="card">
            <p id="comparisonResult">Run analysis to see the logic.</p>
            <p id="tradeOffText" style="font-family: monospace;"></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
