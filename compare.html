<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Homes Smarter</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Compare Homes Smarter</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="compare.html">Compare</a>
        </div>
    </nav>

    <main>
        <section class="compare-hero">
            <h1>Compare Homes</h1>
        </section>

        <section class="compare-section">

            <div class="comparison-tool">
                <h2>Choose what matters most</h2>

                <select id="prioritySelect">
                    <option value="budget">Lower price</option>
                    <option value="space">More space</option>
                    <option value="location">Better location</option>
                </select>

                <button onclick="runComparison()">Compare Homes</button>
                <button onclick="resetComparison()">Reset</button>

                <p id="comparisonResult">Select a priority and click compare.</p>
            </div>

            <div class="compare-grid">
                <div class="compare-card" id="homeA">
                    <h2>Home A</h2>
                    <p>$300,000 | 2000 sqft | Suburb</p>
                </div>

                <div class="compare-card" id="homeB">
                    <h2>Home B</h2>
                    <p>$350,000 | 1500 sqft | City</p>
                </div>
            </div>

            <p id="tradeOffText"></p>

        </section>
    </main>

    <!-- THIS IS THE IMPORTANT PART -->
    <script src="script.js"></script>

</body>
</html>
